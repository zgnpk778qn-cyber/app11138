name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: autoclicker_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-dev python3-venv \
            libssl-dev libffi-dev \
            wget unzip file \
            git autoconf automake autopoint libtool \
            pkg-config ccache cmake \
            openjdk-17-jdk zlib1g-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            autoclicker_app/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('autoclicker_app/buildozer.spec') }}

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          if [ -d "$ANDROID_SDK_ROOT" ]; then
            yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || true
          fi
          buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker-apk
          path: autoclicker_app/bin/*.apk
          if-no-files-found: error
