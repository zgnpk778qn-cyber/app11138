name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: autoclicker_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip python3-dev python3-venv \
            libssl-dev libffi-dev wget unzip file git \
            autoconf automake autopoint libtool pkg-config \
            ccache cmake openjdk-17-jdk zlib1g-dev libltdl-dev \
            libncurses-dev

      - name: Increase swap space
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 6G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython<3" buildozer

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            autoclicker_app/.buildozer
          key: ${{ runner.os }}-buildozer-v7-${{ hashFiles('autoclicker_app/buildozer.spec') }}

      - name: Build APK
        timeout-minutes: 35
        run: |
          buildozer android debug 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "BUILD_EXIT=$BUILD_EXIT" >> $GITHUB_ENV
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "::error::Buildozer failed with exit code $BUILD_EXIT"
            echo "=== Last 200 lines of build output ==="
            tail -200 build.log
            exit $BUILD_EXIT
          fi

      - name: Show APK info
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          echo "=== .buildozer/android/platform (top dirs) ==="
          find .buildozer/android/platform -maxdepth 1 -type d 2>/dev/null | head -20 || echo "No platform dir"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker-apk
          path: |
            autoclicker_app/bin/*.apk
            autoclicker_app/*.apk
            autoclicker_app/.buildozer/**/*.apk
          if-no-files-found: warn
          overwrite: true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: autoclicker_app/build.log
          if-no-files-found: warn
          overwrite: true
