name: Build APK

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: autoclicker_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev python3-venv \
            libssl-dev libffi-dev wget unzip file git autoconf automake \
            autopoint libtool pkg-config ccache cmake openjdk-17-jdk \
            zlib1g-dev libltdl-dev

      - name: Increase swap space
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 6G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython<3" buildozer

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            autoclicker_app/.buildozer
          key: ${{ runner.os }}-buildozer-v6-${{ hashFiles('autoclicker_app/buildozer.spec') }}

      - name: Build APK
        timeout-minutes: 35
        env:
          SETUPTOOLS_USE_DISTUTILS: stdlib
        run: |
          set -eo pipefail
          buildozer android debug 2>&1 | tee build.log | tail -50
          echo "=== buildozer exit: $? ==="

      - name: Show build result
        if: always()
        run: |
          echo "=== Last 80 lines of build log ==="
          tail -80 build.log || echo "no build.log"
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          find /home/runner -name "*.apk" -type f 2>/dev/null
          find /tmp -name "*.apk" -type f 2>/dev/null
          echo "=== Listing dists directories ==="
          find .buildozer -type d -name "dists" 2>/dev/null
          find .buildozer -type d -name "bin" 2>/dev/null
          echo "=== .buildozer structure (top 3 levels) ==="
          find .buildozer -maxdepth 3 -type d 2>/dev/null | head -40

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker-apk
          path: |
            autoclicker_app/bin/*.apk
            autoclicker_app/*.apk
            autoclicker_app/.buildozer/**/*.apk
            /home/runner/work/**/*.apk
          if-no-files-found: warn
          overwrite: true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            autoclicker_app/build.log
          if-no-files-found: warn
          overwrite: true
