name: Build APK

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: autoclicker_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip python3-dev python3-venv \
            libssl-dev libffi-dev \
            wget unzip file \
            git autoconf automake autopoint libtool \
            pkg-config ccache cmake \
            openjdk-17-jdk zlib1g-dev \
            libltdl-dev

      - name: Increase swap space
        run: |
          sudo swapoff -a
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython<3" buildozer

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            autoclicker_app/.buildozer
          key: ${{ runner.os }}-buildozer-v4-${{ hashFiles('autoclicker_app/buildozer.spec') }}

      - name: Build APK
        env:
          SETUPTOOLS_USE_DISTUTILS: stdlib
        run: |
          buildozer android debug 2>&1 | tee build.log
          echo "=== Build exit code: $? ==="
          echo "=== Looking for APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No .apk in ."
          find /home/runner -name "*.apk" -type f 2>/dev/null || echo "No .apk in /home/runner"
          ls -la bin/ 2>/dev/null || echo "bin/ does not exist"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker-apk
          path: |
            autoclicker_app/bin/*.apk
            autoclicker_app/*.apk
            autoclicker_app/.buildozer/android/platform/build-*/dists/*/bin/*.apk
          if-no-files-found: warn
          overwrite: true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: autoclicker_app/build.log
          if-no-files-found: warn
          overwrite: true
